name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest  # Apple Silicon runner (Metal required)

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install maturin numpy scipy networkx

    - name: Build (release)
      run: maturin develop --release

    - name: Verify import
      run: |
        python -c "
        import c2m_core
        classes = [
            'MetalPageRank', 'MetalDeltaStepping', 'MetalConnectedComponents',
            'MetalSpMV', 'MetalScanner', 'MetalNBody', 'MetalGNN',
            'AccelerateRunner', 'MetalRunner', 'Graph'
        ]
        for name in classes:
            obj = getattr(c2m_core, name)()
            print(f'{name}: OK')
        print('All classes verified.')
        "
